version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-stuntdruk}
      - JWT_SECRET=${JWT_SECRET:-replace_this_with_a_long_random_string_in_production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-stuntdruk}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-stuntdruk}"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

volumes:
  pg_data:
    driver: local
